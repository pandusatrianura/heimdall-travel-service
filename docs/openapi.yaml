openapi: 3.1.0
info:
  title: Heimdall Travel Service API
  version: 1.0.0
  description: |
    Formal API contract for Heimdall Travel Service.

    The search endpoint accepts positional trip-item requests:
    - `origins[i]`, `destinations[i]`, `departureDate[i]`, and optional `returnDate[i]` belong to the same trip item.
    - Single-value requests may still use scalar strings.
    - `returnDate` may be `null`, omitted, an empty string, or an array containing `null` entries to represent one-way trip items.

    Responses always return one flat `flights[]` list.
    - For single-trip searches, `search_criteria.origin`, `destination`, and `departure_date` are serialized as scalar strings.
    - For positional multi-trip searches, those same fields are serialized as arrays to preserve index-based mapping.

  The default `best_value` ranking uses a weighted score between normalized price and normalized duration:
  - `BEST_VALUE_PRICE_WEIGHT = 0.6`
  - `BEST_VALUE_DURATION_WEIGHT = 0.4`

  Default formula:
  `score = (0.6 x normalizedPrice) + (0.4 x normalizedDuration)`

  Short numeric example:
  - Flight X: normalized price `0.0`, normalized duration `1.0` -> score `0.4`
  - Flight Y: normalized price `1.0`, normalized duration `0.0` -> score `0.6`

  Concrete mock-data example from `mock_provider/lion_air_search_response.json`:
  - `JT740`: price `950000`, duration `105`
  - `JT742`: price `890000`, duration `110`
  - `JT650`: price `780000`, duration `230`
  - `minPrice = 780000`, `maxPrice = 950000`, `minDuration = 105`, `maxDuration = 230`
  - `JT740`: normalized price `1.0`, normalized duration `0.0`, score `0.6`
  - `JT742`: normalized price `110000 / 170000 ~= 0.647`, normalized duration `5 / 125 = 0.04`, score `~= 0.404`
  - `JT650`: normalized price `0.0`, normalized duration `1.0`, score `0.4`
  - Final order: `JT650`, `JT742`, `JT740`

  Lower score ranks higher, so with the default weights Flight X wins because the algorithm is slightly more price-sensitive than duration-sensitive.
servers:
  - url: http://localhost:8008
    description: Local development server
tags:
  - name: Search
    description: Flight aggregation with positional multi-trip request handling
paths:
  /api/v1/search:
    post:
      tags:
        - Search
      summary: Search one-way, round-trip, or positional multi-trip flights
      description: |
        Searches flights across all configured providers.

        Request semantics:
        - One-way: send one trip item and omit or null `returnDate`
        - Round-trip: send one trip item with a non-empty `returnDate`
        - Multi-trip: send arrays of equal length where each index represents one independent trip item
      parameters:
        - in: query
          name: sort_by
          schema:
            type: string
            enum:
              - best_value
              - price_lowest
              - duration_shortest
              - departure_earliest
          description: |
            Applies sorting to the flat `flights` list.

            `best_value` is a weighted score between normalized price and normalized duration.
            Lower score is better.

            Default formula:
            `score = (0.6 x normalizedPrice) + (0.4 x normalizedDuration)`

            Meaning of the default weights:
            - `BEST_VALUE_PRICE_WEIGHT = 0.6`: price contributes 60% of the final score
            - `BEST_VALUE_DURATION_WEIGHT = 0.4`: duration contributes 40% of the final score

            Concrete mock-data example from `mock_provider/lion_air_search_response.json`:
            - `JT740`: price `950000`, duration `105`, score `0.6`
            - `JT742`: price `890000`, duration `110`, score `~= 0.404`
            - `JT650`: price `780000`, duration `230`, score `0.4`
            - Using `minPrice = 780000`, `maxPrice = 950000`, `minDuration = 105`, `maxDuration = 230`
            - Final order: `JT650`, `JT742`, `JT740`

            This default makes the ranking slightly more price-sensitive than duration-sensitive, so a meaningfully cheaper flight can still outrank a somewhat faster one.
        - in: query
          name: min_price
          schema:
            type: integer
            minimum: 0
          description: Minimum allowed price in IDR.
        - in: query
          name: max_price
          schema:
            type: integer
            minimum: 0
          description: Maximum allowed price in IDR.
        - in: query
          name: max_stops
          schema:
            type: integer
            minimum: 0
          description: Maximum allowed number of stops.
        - in: query
          name: max_duration
          schema:
            type: integer
            minimum: 0
          description: Maximum duration in minutes.
        - in: query
          name: airlines
          schema:
            type: string
          description: Comma-separated airline names, codes, or provider identifiers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              oneWay:
                summary: One-way request
                value:
                  origins: CGK
                  destinations: DPS
                  departureDate: '2025-12-15'
                  returnDate: null
                  passengers: 1
                  cabinClass: economy
              roundTrip:
                summary: Round-trip request
                value:
                  origins: CGK
                  destinations: DPS
                  departureDate: '2025-12-15'
                  returnDate: '2025-12-18'
                  passengers: 1
                  cabinClass: economy
              multiTrip:
                summary: Positional multi-trip request
                value:
                  origins:
                    - CGK
                    - SUB
                  destinations:
                    - DPS
                    - SIN
                  departureDate:
                    - '2025-12-15'
                    - '2025-12-20'
                  returnDate:
                    - null
                    - '2025-12-26'
                  passengers: 1
                  cabinClass: economy
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                oneWay:
                  summary: One-way flat response
                  value:
                    search_criteria:
                      origin: CGK
                      destination: DPS
                      departure_date: '2025-12-15'
                      passengers: 1
                      cabin_class: economy
                    metadata:
                      total_results: 1
                      providers_queried: 4
                      providers_succeeded: 4
                      providers_failed: 0
                      search_time_ms: 150
                      cache_hit: false
                    flights:
                      - id: garuda-outbound-1
                        provider: Garuda Indonesia
                        airline:
                          name: Garuda Indonesia
                          code: GA
                        flight_number: GA-400
                        departure:
                          airport: CGK
                          city: Jakarta
                          datetime: '2025-12-15T09:00:00+07:00'
                          timestamp: 1765764000
                        arrival:
                          airport: DPS
                          city: Denpasar
                          datetime: '2025-12-15T11:50:00+08:00'
                          timestamp: 1765770600
                        duration:
                          total_minutes: 110
                          formatted: 1h 50m
                        stops: 0
                        price:
                          amount: 1800000
                          formatted_amount: Rp 1.800.000
                          currency: IDR
                        available_seats: 6
                        cabin_class: economy
                        aircraft: Boeing 737-800
                        amenities:
                          - meal
                          - entertainment
                        baggage:
                          carry_on: 7kg
                          checked: 20kg
                multiTrip:
                  summary: Mixed one-way and round-trip flat response
                  value:
                    search_criteria:
                      origin:
                        - CGK
                        - SUB
                      destination:
                        - DPS
                        - SIN
                      departure_date:
                        - '2025-12-15'
                        - '2025-12-20'
                      return_date:
                        - null
                        - '2025-12-26'
                      passengers: 1
                      cabin_class: economy
                    metadata:
                      total_results: 3
                      providers_queried: 4
                      providers_succeeded: 4
                      providers_failed: 0
                      search_time_ms: 190
                      cache_hit: false
                    flights:
                      - id: trip0-outbound-1
                        provider: Garuda Indonesia
                        airline:
                          name: Garuda Indonesia
                          code: GA
                        flight_number: GA-401
                        departure:
                          airport: CGK
                          city: Jakarta
                          datetime: '2025-12-15T07:00:00+07:00'
                          timestamp: 1765756800
                        arrival:
                          airport: DPS
                          city: Denpasar
                          datetime: '2025-12-15T09:50:00+08:00'
                          timestamp: 1765763400
                        duration:
                          total_minutes: 110
                          formatted: 1h 50m
                        stops: 0
                        price:
                          amount: 1750000
                          formatted_amount: Rp 1.750.000
                          currency: IDR
                        available_seats: 5
                        cabin_class: economy
                        aircraft: Airbus A320
                        amenities:
                          - meal
                        baggage:
                          carry_on: 7kg
                          checked: 20kg
                      - id: trip1-outbound-1
                        provider: Lion Air
                        airline:
                          name: Lion Air
                          code: JT
                        flight_number: JT-201
                        departure:
                          airport: SUB
                          city: Surabaya
                          datetime: '2025-12-20T08:00:00+07:00'
                          timestamp: 1766182800
                        arrival:
                          airport: SIN
                          city: Singapore
                          datetime: '2025-12-20T11:20:00+08:00'
                          timestamp: 1766190000
                        duration:
                          total_minutes: 140
                          formatted: 2h 20m
                        stops: 0
                        price:
                          amount: 2100000
                          formatted_amount: Rp 2.100.000
                          currency: IDR
                        available_seats: 4
                        cabin_class: economy
                        aircraft: Boeing 737-900ER
                        amenities:
                          - baggage
                        baggage:
                          carry_on: 7kg
                          checked: 20kg
                      - id: trip1-inbound-1
                        provider: Lion Air
                        airline:
                          name: Lion Air
                          code: JT
                        flight_number: JT-202
                        departure:
                          airport: SIN
                          city: Singapore
                          datetime: '2025-12-26T12:00:00+08:00'
                          timestamp: 1766721600
                        arrival:
                          airport: SUB
                          city: Surabaya
                          datetime: '2025-12-26T13:20:00+07:00'
                          timestamp: 1766722800
                        duration:
                          total_minutes: 140
                          formatted: 2h 20m
                        stops: 0
                        price:
                          amount: 2150000
                          formatted_amount: Rp 2.150.000
                          currency: IDR
                        available_seats: 4
