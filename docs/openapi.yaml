                          - baggage
                        baggage:
                          carry_on: 7kg
                          checked: 20kg
        '400':
          description: Invalid request payload or positional validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                mismatchedArrays:
                  summary: Positional array length mismatch
                  value:
                    error: origins, destinations, and departureDate must have the same number of items
                identityRoute:
                  summary: Invalid identity route
                  value:
                    error: origin and destination cannot be the same for trip item 0
                chronology:
                  summary: Return date earlier than departure date
                  value:
                    error: returnDate cannot be earlier than departureDate for trip item 0
        '500':
          description: Unexpected internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SearchRequest:
      type: object
      properties:
        origin:
          $ref: '#/components/schemas/FlexStringInput'
          description: Legacy alias for `origins`. Preferred only for single-trip compatibility.
        origins:
          $ref: '#/components/schemas/FlexStringInput'
          description: Preferred input for one-way, round-trip, and multi-trip requests.
        destination:
          $ref: '#/components/schemas/FlexStringInput'
          description: Legacy alias for `destinations`.
        destinations:
          $ref: '#/components/schemas/FlexStringInput'
          description: Preferred destination input.
        departureDate:
          $ref: '#/components/schemas/FlexDateInput'
        returnDate:
          $ref: '#/components/schemas/NullableDateInput'
        passengers:
          type: integer
          minimum: 0
          default: 1
        cabinClass:
          type: string
          examples:
            - economy
        sort_by:
          type: string
          description: Accepted in body for compatibility, but the current handler reads filtering and sorting from query parameters.
        min_price:
          type: integer
          minimum: 0
        max_price:
          type: integer
          minimum: 0
        max_stops:
          type: integer
          minimum: 0
        airlines:
          type: array
          items:
            type: string
        max_duration:
          type: integer
          minimum: 0
      anyOf:
        - required:
            - origin
            - destination
            - departureDate
        - required:
            - origins
            - destinations
            - departureDate
    FlexStringInput:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
      examples:
        - CGK
        -
          - CGK
          - SUB
    FlexDateInput:
      oneOf:
        - type: string
          format: date
        - type: array
          items:
            type: string
            format: date
      examples:
        - '2025-12-15'
        -
          - '2025-12-15'
          - '2025-12-20'
    NullableDateInput:
      oneOf:
        - type: 'null'
        - type: string
          format: date
        - type: array
          items:
            oneOf:
              - type: 'null'
              - type: string
                format: date
      examples:
        - null
        - '2025-12-18'
        -
          - null
          - '2025-12-26'
    SearchResponse:
      type: object
      required:
        - search_criteria
        - metadata
        - flights
      properties:
        search_criteria:
          $ref: '#/components/schemas/SearchCriteria'
        metadata:
          $ref: '#/components/schemas/Metadata'
        flights:
          type: array
          items:
            $ref: '#/components/schemas/Flight'
    SearchCriteria:
      type: object
      required:
        - origin
        - destination
        - departure_date
        - passengers
        - cabin_class
      properties:
        origin:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        destination:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        departure_date:
          oneOf:
            - type: string
              format: date
            - type: array
              items:
                type: string
                format: date
        return_date:
          oneOf:
            - type: 'null'
            - type: string
              format: date
            - type: array
              items:
                oneOf:
                  - type: 'null'
                  - type: string
                    format: date
          description: Included only when the request carries return dates. Mixed multi-trip requests may include null entries for one-way items.
        passengers:
          type: integer
        cabin_class:
          type: string
    Metadata:
      type: object
      required:
        - total_results
        - providers_queried
        - providers_succeeded
        - providers_failed
        - search_time_ms
        - cache_hit
      properties:
        total_results:
          type: integer
        providers_queried:
          type: integer
        providers_succeeded:
          type: integer
        providers_failed:
          type: integer
        search_time_ms:
          type: integer
          format: int64
        cache_hit:
          type: boolean
    Flight:
      type: object
      required:
        - id
        - provider
        - airline
        - flight_number
        - departure
        - arrival
        - duration
        - stops
        - price
        - available_seats
        - cabin_class
        - amenities
        - baggage
      properties:
        id:
          type: string
        provider:
          type: string
        airline:
          $ref: '#/components/schemas/Airline'
        flight_number:
          type: string
        departure:
          $ref: '#/components/schemas/FlightPoint'
        arrival:
          $ref: '#/components/schemas/FlightPoint'
        duration:
          $ref: '#/components/schemas/Duration'
        stops:
          type: integer
        price:
          $ref: '#/components/schemas/Price'
        available_seats:
          type: integer
        cabin_class:
          type: string
        aircraft:
          type:
            - string
            - 'null'
        amenities:
          type: array
          items:
            type: string
        baggage:
          $ref: '#/components/schemas/Baggage'
    Airline:
      type: object
      required:
        - name
        - code
      properties:
        name:
          type: string
        code:
          type: string
    FlightPoint:
      type: object
      required:
        - airport
        - city
        - datetime
        - timestamp
      properties:
        airport:
          type: string
        city:
          type: string
        datetime:
          type: string
        timestamp:
          type: integer
          format: int64
    Duration:
      type: object
      required:
        - total_minutes
        - formatted
      properties:
        total_minutes:
          type: integer
        formatted:
          type: string
    Price:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: integer
        formatted_amount:
          type: string
        currency:
          type: string
    Baggage:
      type: object
      required:
        - carry_on
        - checked
      properties:
        carry_on:
          type: string
        checked:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string